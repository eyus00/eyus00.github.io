<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>@eyus00</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Mulish:ital,wght@0,200..1000;1,200..1000&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <style>
    :root {
      --dark-color: #2c2c2c;
      --light-color: #ffffff;
      --main-transition: all 0.2s ease-in-out;
      --font-clean: ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--dark-color);
      color: var(--light-color);
      font-family: var(--font-clean);
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
    }

    .logo-username-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .logo {
      display: grid;
      grid-template-columns: repeat(5, 12px);
      grid-template-rows: repeat(5, 12px);
      gap: 0;
    }

    .dot {
      width: 12px;
      height: 12px;
      background: transparent;
    }

    .dot.active {
      background: #ffffff;
    }

    h1 {
      font-size: 1.25rem;
      margin: 0;
      cursor: pointer;
    }

    a {
      color: inherit;
      text-decoration: none;
      font-weight: bold;
      position: relative;
      overflow: hidden;
      transition: var(--main-transition);
    }

    .email {
      padding: 0.5rem 1rem;
      background-color: #ff5e57;
      color: #fff;
      border: none;
      border-radius: 1.5px;
      font-size: 1rem;
      cursor: pointer;
      transition: var(--main-transition);
      margin-bottom: 0.5rem;
    }

    .email:hover {
      background-color: #ff3e2a;
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      font-size: 0.95rem;
      flex-wrap: wrap;
    }

    ul li::after {
      content: "•";
      margin: 0 0.5rem;
      color: #fff;
    }

    ul li:last-child::after {
      content: "";
    }

    ul li a {
      text-decoration: underline;
      transition: color 0.3s ease;
    }

    ul li a:hover {
      color: #ff5e57;
    }

    .notification {
      position: fixed;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      background-color: #ff5e57;
      color: #fff;
      padding: 0.5rem 1rem;
      border-radius: 5px;
      font-size: 0.875rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .notification.show {
      opacity: 1;
      pointer-events: all;
    }

    .email-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .email-text {
      font-size: 0.75rem;
      color: #bbb;
      cursor: pointer;
    }

  </style>
</head>
<body>
  <div class="wrapper">
    <div class="logo-username-container">
      <div class="logo">
        <!-- Active blocks: 1,2,4,5,10,11,13,15,16,21,22,24,25 -->
        <div class="dot active"></div>  <!-- 1 -->
        <div class="dot active"></div>  <!-- 2 -->
        <div class="dot"></div>         <!-- 3 -->
        <div class="dot active"></div>  <!-- 4 -->
        <div class="dot active"></div>  <!-- 5 -->
        <div class="dot"></div>         <!-- 6 -->
        <div class="dot"></div>         <!-- 7 -->
        <div class="dot"></div>         <!-- 8 -->
        <div class="dot"></div>         <!-- 9 -->
        <div class="dot active"></div>  <!-- 10 -->
        <div class="dot active"></div>  <!-- 11 -->
        <div class="dot"></div>         <!-- 12 -->
        <div class="dot active"></div>  <!-- 13 -->
        <div class="dot"></div>         <!-- 14 -->
        <div class="dot active"></div>  <!-- 15 -->
        <div class="dot active"></div>  <!-- 16 -->
        <div class="dot"></div>         <!-- 17 -->
        <div class="dot"></div>         <!-- 18 -->
        <div class="dot"></div>         <!-- 19 -->
        <div class="dot"></div>         <!-- 20 -->
        <div class="dot active"></div>  <!-- 21 -->
        <div class="dot active"></div>  <!-- 22 -->
        <div class="dot"></div>         <!-- 23 -->
        <div class="dot active"></div>  <!-- 24 -->
        <div class="dot active"></div>  <!-- 25 -->
      </div>
      <h1 id="username">@eyus00</h1>
    </div>

    <!-- Email button and text close together -->
    <div class="email-container">
      <button class="email" onclick="window.location.href='mailto:eyus00@duck.com'">email</button>
      <div class="email-text" id="email-text">eyus00@duck.com</div>
    </div>

    <ul>
      <li><a href="https://github.com/eyus00" target="_blank">github</a></li>
      <li><a href="https://t.me/eyus00" target="_blank">telegram</a></li>
      <li><a href="https://x.com/eyus00" target="_blank">twitter</a></li>
      <li><a href="https://discord.com/users/652309996381405184" target="_blank">discord</a></li>
      <li><a href="https://open.spotify.com/user/31bwbfo6gfwaa5xlk5yrg3dbdyqa" target="_blank">spotify</a></li>
    </ul>
  </div>

  <!-- Notification div -->
  <div class="notification" id="notification">Email copied to clipboard!</div>

  <script>
    // Get the username and email text elements and notification element
    const username = document.getElementById('username');
    const emailText = document.getElementById('email-text');
    const notification = document.getElementById('notification');

    // Copy username to clipboard and show notification
    username.addEventListener('click', () => {
      navigator.clipboard.writeText(username.textContent).then(() => {
        // Show notification
        notification.classList.add('show');
        setTimeout(() => {
          notification.classList.remove('show');
        }, 2000); // Notification will disappear after 2 seconds
      });
    });

    // Copy email text to clipboard when clicked
    emailText.addEventListener('click', () => {
      navigator.clipboard.writeText(emailText.textContent).then(() => {
        // Show notification for email copy
        notification.textContent = 'Email copied to clipboard!';
        notification.classList.add('show');
        setTimeout(() => {
          notification.classList.remove('show');
        }, 2000); // Notification will disappear after 2 seconds
      });
    });
  </script>
</body>
</html>
