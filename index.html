      height: 100%;
      display: flex;

    }

    .wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;

    }

    .logo {
      display: grid;
      grid-template-columns: repeat(5, 12px);
      grid-template-rows: repeat(5, 12px);
    }

    .dot {
      width: 12px;
      height: 12px;
      background: transparent;
    }

    .dot.active {
      background: #ffffff;
    }

    h1 {
      font-size: 1.25rem;
      margin: 0;
    }

    a {
      color: inherit;
      text-decoration: underline;
      transition: opacity 0.2s ease;
    }

    a:hover {
      opacity: 0.6;
    }

    .email {
      display: inline-block;
      margin-top: 0.5rem;
      padding: 0.25rem 0.75rem;
      border: 1px solid #fff;
      text-decoration: none;
      color: inherit;
    }

    .email:hover {
      opacity: 0.6;
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      font-size: 0.95rem;
      flex-wrap: wrap;
    }

    ul li::after {
      content: "•";
      margin: 0 0.5rem;
      color: #fff;
    }

    ul li:last-child::after {
      content: "";
    }
  </style>
</head>
