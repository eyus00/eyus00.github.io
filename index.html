<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <title>@eyus00</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Mulish:ital,wght@0,200..1000;1,200..1000&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <style>
    :root {
      --dark-color: #2c2c2c;
      --light-color: #ffffff;
      --gif-texture: url(https://64.media.tumblr.com/da60c13b478dda09ab90c27e880983b8/tumblr_nd4pwdPKdc1tun3l0o1_1280.gifv);
      --main-transition: all 0.2s ease-in-out;
      --font-clean: ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--dark-color);
      color: var(--light-color);
      font-family: var(--font-clean);
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    .logo {
      display: grid;
      grid-template-columns: repeat(5, 12px);
      grid-template-rows: repeat(5, 12px);
      gap: 0;
    }

    .dot {
      width: 12px;
      height: 12px;
      background: transparent;
    }

    .dot.active {
      background: #ffffff;
    }

    h1 {
      font-size: 1.25rem;
      margin: 0;
    }

    a {
      color: inherit;
      text-decoration: underline;
      transition: opacity 0.2s ease;
    }

    a:hover {
      opacity: 0.6;
    }

    .email {
      display: inline-block;
      margin-top: 0.5rem;
      padding: 0.25rem 0.75rem;
      border: 1px solid #fff;
      text-decoration: none;
      color: inherit;
      position: relative;
      overflow: hidden;
      z-index: 1;
      transition: var(--main-transition);
    }

    .email::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: var(--gif-texture);
      background-size: cover;
      background-repeat: no-repeat;
      background-position: center;
      mix-blend-mode: screen;
      opacity: 0;
      z-index: -1;
      transition: opacity 0.4s ease-in-out;
    }

    .email:hover::after {
      opacity: 0.6;
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      font-size: 0.95rem;
      flex-wrap: wrap;
    }

    ul li::after {
      content: "•";
      margin: 0 0.5rem;
      color: #fff;
    }

    ul li:last-child::after {
      content: "";
    }
  </style>
</head>
