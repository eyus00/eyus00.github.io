<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>@eyus00</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #2c2c2c;
      color: #ffffff;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    .logo {
      display: grid;
      grid-template-columns: repeat(5, 12px);
      grid-template-rows: repeat(5, 12px);
      gap: 2px;
      margin-bottom: 1rem;
    }

    .dot {
      width: 12px;
      height: 12px;
      background: transparent;
    }

    .dot.active {
      background: #ffffff;
    }

    h1 {
      font-size: 1.25rem;
      margin: 0;
      display: inline-block;
      margin-left: 10px;
    }

    .holographic-button {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      text-decoration: none;
      background: #111;
      color: #0ff;
      font-size: 1rem;
      border-radius: 5px;
      position: relative;
      transition: all 0.3s ease;
    }

    .holographic-button::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(0deg, transparent, transparent 30%, rgba(0, 255, 255, 0.3));
      transform: rotate(-45deg);
      transition: all 0.3s ease;
      opacity: 0;
    }

    .holographic-button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
    }

    .holographic-button:hover::before {
      opacity: 1;
      transform: rotate(-45deg) translateY(100%);
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      font-size: 0.95rem;
      flex-wrap: wrap;
    }

    ul li::after {
      content: "•";
      margin: 0 0.5rem;
      color: #fff;
    }

    ul li:last-child::after {
      content: "";
    }

  </style>
</head>
<body>
  <div class="wrapper">
    <!-- Logo grid -->
    <div class="logo">
      <div class="dot active"></div>  <!-- 1 -->
      <div class="dot active"></div>  <!-- 2 -->
      <div class="dot"></div>         <!-- 3 -->
      <div class="dot active"></div>  <!-- 4 -->
      <div class="dot active"></div>  <!-- 5 -->
      <div class="dot"></div>         <!-- 6 -->
      <div class="dot"></div>         <!-- 7 -->
      <div class="dot"></div>         <!-- 8 -->
      <div class="dot"></div>         <!-- 9 -->
      <div class="dot active"></div>  <!-- 10 -->
      <div class="dot active"></div>  <!-- 11 -->
      <div class="dot"></div>         <!-- 12 -->
      <div class="dot active"></div>  <!-- 13 -->
      <div class="dot"></div>         <!-- 14 -->
      <div class="dot active"></div>  <!-- 15 -->
      <div class="dot active"></div>  <!-- 16 -->
      <div class="dot"></div>         <!-- 17 -->
      <div class="dot"></div>         <!-- 18 -->
      <div class="dot"></div>         <!-- 19 (now inactive) -->
      <div class="dot"></div>         <!-- 20 -->
      <div class="dot active"></div>  <!-- 21 -->
      <div class="dot active"></div>  <!-- 22 (now active) -->
      <div class="dot"></div>         <!-- 23 -->
      <div class="dot active"></div>  <!-- 24 -->
      <div class="dot active"></div>  <!-- 25 -->
    </div>

    <!-- Username and email button -->
    <div style="display: flex; align-items: center;">
      <h1>@eyus00</h1>
      <a href="mailto:eyus00@duck.com" class="holographic-button">email</a>
    </div>

    <!-- Social Links -->
    <ul>
      <li><a href="https://github.com/eyus00" target="_blank">github</a></li>
      <li><a href="https://t.me/eyus00" target="_blank">telegram</a></li>
      <li><a href="https://x.com/eyus00" target="_blank">twitter</a></li>
      <li><a href="https://discord.com/users/652309996381405184" target="_blank">discord</a></li>
      <li><a href="https://open.spotify.com/user/31bwbfo6gfwaa5xlk5yrg3dbdyqa" target="_blank">spotify</a></li>
    </ul>
  </div>
</body>
</html>
