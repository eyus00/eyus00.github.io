    body {
      margin: 0;
      padding: 2rem;
      font-family: 'Segoe UI', sans-serif;
      background: #fff;
      color: #000;
      text-align: center;
    }

    .logo {
      display: grid;
      grid-template-columns: repeat(5, 10px);
      grid-template-rows: repeat(5, 10px);
      gap: 2px;
      background: #2c2c2c;
      width: fit-content;
      margin: 0 auto 2rem;
      padding: 6px;
    }

    .dot {
      width: 10px;
      height: 10px;
      background: transparent;
    }

    .dot.active {
      background: #fff;
    }

    h1 {
      font-size: 1.5rem;
      margin: 0 0 1.5rem;
    }

    a {
      text-decoration: underline;
      color: inherit;
      transition: opacity 0.2s ease;
    }

    a:hover {
      opacity: 0.6;
    }

    .email {
      display: inline-block;
      margin-bottom: 2rem;
      padding: 0.25rem 0.75rem;
      border: 1px solid #000;
      text-decoration: none;
      color: inherit;
      transition: opacity 0.2s ease;
    }

    .email:hover {
      opacity: 0.6;
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0.5rem;
      font-size: 0.95rem;
    }

    ul li::after {
      content: "•";
      margin: 0 0.5rem;
      color: #000;
    }

    ul li:last-child::after {
      content: "";
    }
  </style>
</head>
