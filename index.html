<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>@eyus00</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Mulish:ital,wght@0,200..1000;1,200..1000&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <style>
    :root {
      --dark-color: #2c2c2c;
      --light-color: #ffffff;
      --main-transition: all 0.2s ease-in-out;
      --font-clean: ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--dark-color);
      color: var(--light-color);
      font-family: var(--font-clean);
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 2rem;
    }

    .wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      width: 100%;
      max-width: 800px;
      padding: 2rem;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.4);
    }

    .logo {
      display: grid;
      grid-template-columns: repeat(5, 12px);
      grid-template-rows: repeat(5, 12px);
      gap: 0;
    }

    .dot {
      width: 12px;
      height: 12px;
      background: transparent;
    }

    .dot.active {
      background: #ffffff;
    }

    h1 {
      font-size: 2rem;
      margin: 0;
      color: var(--light-color);
    }

    .email {
      display: inline-block;
      padding: 0.5rem 1.25rem;
      border: 1px solid #fff;
      text-decoration: none;
      color: inherit;
      font-size: 1.1rem;
      transition: var(--main-transition);
      background-color: #444;
      border-radius: 5px;
    }

    .email:hover {
      opacity: 0.8;
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      font-size: 1.1rem;
      flex-wrap: wrap;
    }

    ul li::after {
      content: "•";
      margin: 0 0.5rem;
      color: #fff;
    }

    ul li:last-child::after {
      content: "";
    }

    .social-links {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      flex-wrap: wrap;
      margin-top: 1.5rem;
    }

    .social-links a {
      color: #fff;
      text-decoration: none;
      font-size: 1.1rem;
      position: relative;
      padding: 0.5rem;
      border-radius: 5px;
      transition: opacity 0.2s ease;
    }

    .social-links a:hover {
      opacity: 0.7;
    }

  </style>
</head>
<body>
  <div class="wrapper">
    <div class="logo">

      <div class="dot active"></div>  <!-- 21 -->
      <div class="dot active"></div>  <!-- 22 -->
      <div class="dot"></div>         <!-- 23 -->
      <div class="dot active"></div>  <!-- 24 -->
      <div class="dot active"></div>  <!-- 25 -->
    </div>

</html>
